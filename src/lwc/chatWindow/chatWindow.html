<template>
    <lightning-card title="ChatBot" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
            <div class="chat-window">
                <template for:each={messages} for:item="message">
                    <div key={message.id} class={message.cssClass}>
                        {message.content}
                    </div>
                </template>
            </div>
            <div class="slds-grid slds-grid_align-spread">
                <lightning-input type="text" placeholder="Type your message"
                                 value={inputMessage}
                                 onchange={handleInputChange} class="message-input">
                </lightning-input>
                <lightning-button class="send-button" label="Send" title="Send"
                                  onclick={sendMessage}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
